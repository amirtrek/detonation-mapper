    <path d="M620 190 L660 240 L720 300 L770 360 L820 410"/>
    <path d="M1080 250 L1150 300 L1220 340 L1300 380"/>
    <path d="M1280 520 L1340 560 L1400 610"/>
  </g>

  <g filter="url(#shadow)">
