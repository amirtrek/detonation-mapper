    <path d="M820 20 L840 800" stroke="#bfa7db" stroke-width="5" opacity="0.85"/>
    <path d="M910 0 L1180 0 L1260 90 L1070 140 L960 90 Z" fill="#cae2b5" opacity="0.85"/>
    <path d="M940 170 L1080 170 L1080 280 L900 280 L900 210 Z" fill="#9dd3ea" opacity="0.9"/>
  </g>

  <g stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.95">
    <path d="M300 470 C420 380, 520 320, 670 280 S860 250, 970 300 S1130 360, 1290 330 S1470 260, 1600 250"/>
    <path d="M80 200 C190 220, 270 260, 360 340 S510 500, 670 560"/>
    <path d="M1180 120 C1240 230, 1260 340, 1260 460 S1270 640, 1300 800"/>
    <path d="M1110 300 C1000 360, 930 450, 860 530"/>
    <path d="M1030 380 C1160 430, 1300 450, 1450 420"/>
    <path d="M210 610 C290 560, 370 530, 450 520"/>
  </g>

  <g opacity="0.35">
    <path d="M220 130 L300 220 L360 140 L430 210 L500 120 L610 180 L560 290 L410 320 L260 280 Z" fill="#d9d0e6"/>
    <path d="M980 270 L1150 260 L1230 340 L1120 450 L960 420 Z" fill="#d7f0c7"/>
    <path d="M1220 460 L1420 450 L1490 560 L1360 640 L1210 590 Z" fill="#ead6d1"/>
    <path d="M500 350 L660 360 L720 500 L580 570 L420 490 Z" fill="#cde0f5"/>
