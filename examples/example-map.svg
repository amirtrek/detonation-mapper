      <stop offset="0%" stop-color="#b9dbe6"/>
      <stop offset="100%" stop-color="#9ec8d7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="800" fill="#f4efe6"/>
  <path d="M0 800 L520 800 L700 620 L860 700 L1000 610 L1120 700 L1300 640 L1600 610 L1600 800 Z" fill="url(#water)" opacity="0.95"/>

  <g opacity="0.95">
