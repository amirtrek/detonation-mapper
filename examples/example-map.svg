    <text x="18" y="783" fill="#ffffff" font-family="Arial, sans-serif" font-size="12">2000 ft</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1360" y="776" width="228" height="18" fill="#ffffff" opacity="0.92"/>
    <rect x="1366" y="781" width="12" height="8" fill="#ffd84a"/>
    <rect x="1379" y="781" width="12" height="8" fill="#2a6db1"/>
    <text x="1396" y="789" fill="#4d4d4d" font-family="Arial, sans-serif" font-size="12">Leaflet | OpenStreetMap contributors</text>
