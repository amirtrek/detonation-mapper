<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800" role="img" aria-labelledby="title desc">
  <title id="title">Example detonation map</title>
  <desc id="desc">A stylized map showing a camera marker, a detonation marker, and a line between them.</desc>
  <defs>
