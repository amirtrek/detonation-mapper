    <circle cx="0" cy="18" r="10" fill="#ffffff" opacity="0.96"/>
    <rect x="-8" y="10" width="16" height="12" rx="2" fill="#46b6ea"/>
    <circle cx="0" cy="16" r="3" fill="#ffffff"/>
    <path d="M-12 12 h4 l2 -4 h12 l2 4 h4" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(940 400)" filter="url(#shadow)">
    <path d="M0 -8 C14 -8 26 4 26 18 C26 39 0 62 0 62 C0 62 -26 39 -26 18 C-26 4 -14 -8 0 -8 Z" fill="#ec5a3c"/>
    <path d="M0 4 L13 28 H-13 Z" fill="#ffffff"/>
    <rect x="-2" y="11" width="4" height="9" rx="2" fill="#ec5a3c"/>
